# Content Engine — daily orchestrator tick (cloud schedule for the autonomous blog pipeline).
#
# Runs scripts/content-engine/orchestrator.ts in the cloud once a day:
#   draft-writer (brief_ready -> drafted, reads article-drafts/*.mdx from the checkout)
#   -> signoff-concierge (drafted -> in_review, creates the Ewa ClickUp task)
#   -> syncApprovals (in_review + ClickUp 'complete' -> approved)
#   -> publishDue (approved + due<=today -> compile-gate -> publish -> revalidate).
# After the tick, sync-mirror.ts re-syncs content/blog/*.mdx from the live DB (body-only,
# idempotent) and the workflow commits any changed mirror files back to the repo.
#
# The tick is idempotent + state-driven, so a daily cadence is safe: it only acts when
# there is work due. GitHub Actions is the right runner because Draft-Writer needs the repo
# checked out (the article-drafts MDX files) — a Supabase Edge Function couldn't read those.
#
# REQUIRED repo secrets (Settings -> Secrets and variables -> Actions):
#   NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, CLICKUP_API_TOKEN,
#   REVALIDATE_SECRET, PREVIEW_SECRET
# OPTIONAL:
#   CONTENT_ENGINE_BASE_URL  (defaults to https://andro-prime.com inside the script)

name: content-engine

on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC daily (08:00 BST) — the daily publish tick
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Report only, write nothing (--dry)'
        type: boolean
        default: false

# Never let two ticks overlap (the publish flip is exactly-once, but no point racing).
concurrency:
  group: content-engine
  cancel-in-progress: false

permissions:
  contents: write # the post-tick mirror sync commits content/blog/*.mdx back to the repo

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: andro-prime/09_website-app/frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: andro-prime/09_website-app/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run orchestrator tick
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          PREVIEW_SECRET: ${{ secrets.PREVIEW_SECRET }}
          CONTENT_ENGINE_BASE_URL: ${{ secrets.CONTENT_ENGINE_BASE_URL }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/content-engine/orchestrator.ts --dry
          else
            npx tsx scripts/content-engine/orchestrator.ts
          fi

      # After the tick (publishes + re-opt promotes change the live DB body), re-sync the
      # git-tracked mirror so content/blog/*.mdx matches live. Body-only + idempotent.
      - name: Sync blog mirror from DB
        if: ${{ inputs.dry_run != true }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/content-engine/sync-mirror.ts

      # Mirror the git-first Content Library (06_marketing/content-machine/assets/*.md)
      # into the ClickUp "Content Library" list. One-way, git wins. continue-on-error so
      # the mirror can never fail the engine run: a ClickUp hiccup must not block publishing.
      - name: Content Library mirror
        continue-on-error: true
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/content-engine/content-library-sync.ts --dry
          else
            npx tsx scripts/content-engine/content-library-sync.ts
          fi

      - name: Commit mirror changes
        if: ${{ inputs.dry_run != true }}
        run: |
          if git diff --quiet -- content/blog; then
            echo "mirror in sync — nothing to commit"
          else
            git config user.name "content-engine[bot]"
            git config user.email "content-engine@andro-prime.com"
            git add content/blog
            git commit -m "chore(blog): sync content/blog mirror from live DB [skip ci]"
            git push
          fi
